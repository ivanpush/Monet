<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
  <!-- Claude AI spark/starburst - 12 rounded petals radiating from center -->
  <g transform="translate(8,8)">
    <!-- Each petal is a rounded rectangle rotated around center -->
    <rect x="-1" y="-6.5" width="2" height="5" rx="1" ry="1" transform="rotate(0)"/>
    <rect x="-1" y="-6.5" width="2" height="5" rx="1" ry="1" transform="rotate(30)"/>
    <rect x="-1" y="-6.5" width="2" height="5" rx="1" ry="1" transform="rotate(60)"/>
    <rect x="-1" y="-6.5" width="2" height="5" rx="1" ry="1" transform="rotate(90)"/>
    <rect x="-1" y="-6.5" width="2" height="5" rx="1" ry="1" transform="rotate(120)"/>
    <rect x="-1" y="-6.5" width="2" height="5" rx="1" ry="1" transform="rotate(150)"/>
    <rect x="-1" y="-6.5" width="2" height="5" rx="1" ry="1" transform="rotate(180)"/>
    <rect x="-1" y="-6.5" width="2" height="5" rx="1" ry="1" transform="rotate(210)"/>
    <rect x="-1" y="-6.5" width="2" height="5" rx="1" ry="1" transform="rotate(240)"/>
    <rect x="-1" y="-6.5" width="2" height="5" rx="1" ry="1" transform="rotate(270)"/>
    <rect x="-1" y="-6.5" width="2" height="5" rx="1" ry="1" transform="rotate(300)"/>
    <rect x="-1" y="-6.5" width="2" height="5" rx="1" ry="1" transform="rotate(330)"/>
  </g>
</svg>
